<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>After The Noise — Concours Live</title>

<style>
:root{
  --gold:#d6a94f;
  --cyan:#20e8ff;
  --pink:#ff42db;
  --bg:#050509;
  --card:rgba(255,255,255,.085);
}

*{box-sizing:border-box}

body{
  margin:0;
  background:radial-gradient(circle at top,#19192f,#050509 70%);
  color:white;
  font-family:Arial,sans-serif;
  overflow-y:auto;
}

.background-singer{
  position:fixed;
  right:-90px;
  bottom:0;
  width:42vw;
  height:100vh;
  background:url("singer.png") center bottom/contain no-repeat;
  opacity:.07;
  z-index:0;
  pointer-events:none;
}

.page{
  width:100vw;
  min-height:100vh;
  padding:22px 26px;
  position:relative;
  z-index:1;
}

.logo{
  display:block;
  width:230px;
  max-height:120px;
  object-fit:contain;
  margin:0 auto 6px;
  filter:drop-shadow(0 0 10px rgba(255,255,255,.55))
         drop-shadow(0 0 28px rgba(32,232,255,.35));
}

h1{
  text-align:center;
  font-size:36px;
  margin:0;
  text-transform:uppercase;
  letter-spacing:.5px;
}

.subtitle{
  text-align:center;
  color:var(--gold);
  font-size:18px;
  margin:8px 0 12px;
  font-weight:bold;
}

.actions{
  display:flex;
  justify-content:center;
  gap:12px;
  margin:12px 0 18px;
  flex-wrap:wrap;
}

.button{
  border:1px solid rgba(214,169,79,.7);
  background:linear-gradient(180deg,#d6a94f,#a87928);
  color:#111;
  font-weight:bold;
  text-decoration:none;
  padding:10px 18px;
  border-radius:999px;
  box-shadow:0 0 20px rgba(214,169,79,.22);
}

.live{
  color:#ff5050;
  font-weight:bold;
  letter-spacing:1px;
}

.ranking{
  display:flex;
  flex-direction:column;
  gap:9px;
}

.item{
  display:grid;
  grid-template-columns:46px 62px 1fr 78px;
  gap:12px;
  align-items:center;
  background:var(--card);
  border:1px solid rgba(255,255,255,.12);
  border-radius:18px;
  padding:10px 12px;
  backdrop-filter:blur(8px);
  box-shadow:0 10px 30px rgba(0,0,0,.18);
  transition:transform .55s ease, background .55s ease, border .55s ease;
  animation:enter .45s ease both;
}

.item:hover{
  transform:translateY(-2px);
}

.item.top1{
  background:linear-gradient(90deg,rgba(214,169,79,.42),rgba(255,255,255,.09));
  border-color:rgba(214,169,79,.75);
}

.item.top2{
  background:linear-gradient(90deg,rgba(190,210,255,.22),rgba(255,255,255,.08));
}

.item.top3{
  background:linear-gradient(90deg,rgba(205,127,50,.25),rgba(255,255,255,.08));
}

.item.changed{
  animation:pulse .9s ease;
}

.rank{
  font-size:25px;
  font-weight:bold;
  text-align:center;
}

.cover{
  width:54px;
  height:76px;
  object-fit:cover;
  border-radius:9px;
  background:#222;
  box-shadow:0 8px 18px rgba(0,0,0,.5);
}

.title{
  font-size:20px;
  font-weight:bold;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

.badge{
  display:inline-block;
  margin-top:4px;
  color:var(--gold);
  font-size:11px;
  text-transform:uppercase;
  letter-spacing:.7px;
}

.bar-bg{
  height:10px;
  background:rgba(255,255,255,.18);
  border-radius:20px;
  margin-top:7px;
  overflow:hidden;
}

.bar{
  height:100%;
  width:0%;
  background:linear-gradient(90deg,var(--cyan),var(--pink));
  border-radius:20px;
  transition:width 1s ease;
}

.votes{
  text-align:right;
  font-size:23px;
  font-weight:bold;
}

.small{
  display:block;
  font-size:11px;
  opacity:.65;
  font-weight:normal;
}

.footer{
  text-align:center;
  opacity:.7;
  font-size:15px;
  margin:16px 0 20px;
}

@keyframes enter{
  from{opacity:0;transform:translateY(16px)}
  to{opacity:1;transform:translateY(0)}
}

@keyframes pulse{
  0%{box-shadow:0 0 0 rgba(214,169,79,0)}
  45%{box-shadow:0 0 35px rgba(214,169,79,.55)}
  100%{box-shadow:0 10px 30px rgba(0,0,0,.18)}
}

@media(max-width:700px){
  .background-singer{
    right:-120px;
    width:80vw;
    opacity:.045;
  }

  .page{padding:14px 9px}

  .logo{width:150px}

  h1{font-size:22px}

  .subtitle{font-size:14px}

  .button{
    padding:9px 14px;
    font-size:13px;
  }

  .item{
    grid-template-columns:34px 42px 1fr 42px;
    gap:8px;
    padding:8px;
    border-radius:14px;
  }

  .cover{
    width:40px;
    height:57px;
  }

  .rank{font-size:18px}

  .title{font-size:14px}

  .votes{font-size:17px}

  .badge{font-size:9px}
}
</style>
</head>

<body>

<div class="background-singer"></div>

<div class="page">
  <img class="logo" src="logo.png">

  <h1>🏆 Quels titres auront leur clip ?</h1>
  <div class="subtitle" id="subtitle">Chargement du classement...</div>

  <div class="actions">
    <a class="button" href="https://forms.gle/o1P7CUzzwxrUfZtb9" target="_blank">🗳️ Voter maintenant</a>
    <span class="button" id="refreshBtn">🔄 Actualiser</span>
  </div>

  <div id="ranking" class="ranking"></div>

  <div class="footer" id="footer">Connexion au classement live...</div>
</div>

<script>
const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSoVsWLs_Ww7ffHP4gbok89xJ6nAexPnEgTFSAIZ6_szx_Ogt63qqmWOE4y3Mh06g7imbn-mM__Mz1n/pub?gid=1405857124&single=true&output=csv";

let previousVotes = {};

function splitCSV(line){
  const result=[];
  let current="";
  let quote=false;

  for(let i=0;i<line.length;i++){
    const char=line[i];
    if(char === '"') quote=!quote;
    else if(char === "," && !quote){
      result.push(current);
      current="";
    }else{
      current+=char;
    }
  }

  result.push(current);
  return result.map(x=>x.replace(/^"|"$/g,"").trim());
}

function medal(index){
  if(index===0) return "🥇";
  if(index===1) return "🥈";
  if(index===2) return "🥉";
  return index+1;
}

function badge(index, votes, max){
  if(index===0) return "Clip presque assuré";
  if(index===1 || index===2) return "En course";
  if(votes > 0 && max - votes <= 2) return "Peut créer la surprise";
  if(votes > 0) return "Soutenu par le public";
  return "";
}

async function loadRanking(){
  try{
    const response = await fetch(CSV_URL + "&cache=" + Date.now());
    const text = await response.text();
    const lines = text.trim().split(/\r?\n/).slice(1);

    const songs = lines.map(line=>{
      const c = splitCSV(line);
      return {
        title:c[2],
        votes:Number(c[3]) || 0,
        image:c[5]
      };
    }).filter(s=>s.title);

    const max = Math.max(...songs.map(s=>s.votes),1);
    const totalChoices = songs.reduce((sum,s)=>sum+s.votes,0);
    const participants = Math.round(totalChoices / 3);

    document.getElementById("subtitle").innerHTML =
      `<span class="live">● LIVE</span> · ${participants} participant(s) · ${totalChoices} choix enregistrés`;

    const ranking = document.getElementById("ranking");
    ranking.innerHTML = "";

    songs.forEach((s,i)=>{
      const percent = Math.max(4,(s.votes/max)*100);
      const topClass = i===0 ? "top1" : i===1 ? "top2" : i===2 ? "top3" : "";
      const changed = previousVotes[s.title] !== undefined && previousVotes[s.title] !== s.votes;
      const badgeText = badge(i, s.votes, max);

      const item = document.createElement("div");
      item.className = `item ${topClass} ${changed ? "changed" : ""}`;

      item.innerHTML = `
        <div class="rank">${medal(i)}</div>
        <img class="cover" src="${s.image}">
        <div>
          <div class="title">${s.title}</div>
          ${badgeText ? `<div class="badge">${badgeText}</div>` : ``}
          <div class="bar-bg">
            <div class="bar" style="width:${percent}%"></div>
          </div>
        </div>
        <div class="votes">${s.votes}<span class="small">voix</span></div>
      `;

      ranking.appendChild(item);
      previousVotes[s.title] = s.votes;
    });

    const now = new Date();
    document.getElementById("footer").innerText =
      "Dernière mise à jour : " + now.toLocaleTimeString("fr-FR");

  }catch(error){
    document.getElementById("ranking").innerHTML =
      '<div class="subtitle">Erreur de chargement du classement.</div>';
  }
}

document.getElementById("refreshBtn").addEventListener("click", loadRanking);

loadRanking();
setInterval(loadRanking, 8000);
</script>

</body>
</html>
